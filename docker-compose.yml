services:
  postgres:
    image: postgres:16
    container_name: campus_pg
    environment:
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB:       campus_booking
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      # Auto-apply schema on first container start (Postgres runs any .sql in
      # /docker-entrypoint-initdb.d exactly once, when the data dir is empty).
      - ./schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    # Dev-friendly: log every SQL statement so testers can watch queries live
    # via `docker compose logs -f postgres`.
    command: ["postgres", "-c", "log_statement=all", "-c", "log_min_duration_statement=0"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d campus_booking"]
      interval: 3s
      timeout: 3s
      retries: 10

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: campus_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL:    admin@local.com
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: "False"
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
